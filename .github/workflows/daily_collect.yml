name: 毎日定時ランキング収集

on:
  schedule:
    # 毎日 JST 08:00 (= UTC 23:00 前日)
    - cron: "0 23 * * *"
  workflow_dispatch:  # 手動実行ボタン

permissions:
  contents: write  # DB ファイルをコミット・プッシュするために必要

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: シングル・ダブル全300件を収集して DB に保存
        run: python collect.py

      - name: DB ファイルをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.db
          git diff --cached --quiet && echo "変更なし、スキップ" && exit 0
          git commit -m "data: rankings $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
