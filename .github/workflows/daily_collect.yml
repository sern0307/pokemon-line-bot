name: 毎日定時ランキング収集

on:
  schedule:
    # 毎日 JST 04:00 (= UTC 19:00 前日)
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      final_season:
        description: |
          最終結果として保存するシーズン番号（例: 1）。
          空欄のままなら通常の定時収集を実行します。
        required: false
        default: ""
      final_date:
        description: |
          最終結果を保存する日付（例: 2026-05-13）。
          空欄なら final_season の最終定時収集日を自動使用します。
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ランキング収集
        env:
          SEASON:       ${{ github.event.inputs.final_season }}
          FINAL_SEASON: ${{ github.event.inputs.final_season }}
          FINAL_DATE:   ${{ github.event.inputs.final_date }}
        run: python collect.py

      - name: DB ファイルをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.db
          git diff --cached --quiet && echo "変更なし、スキップ" && exit 0
          git commit -m "data: rankings $(TZ=Asia/Tokyo date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
